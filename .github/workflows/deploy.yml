name: CI/CD Deployment - Spring PetClinic to AWS

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write # Required if committing the state file back to the repo
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Pull all history so git commit works properly if committing state file
          fetch-depth: 0

      # 2. Set up Java JDK 17 (Required to build the Spring Boot JAR)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      # 3. Build the application and generate the JAR
      - name: Build JAR with Maven
        run: ./mvnw clean package -DskipTests

# 4. Configure AWS Credentials via Access Keys (sans OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 5. Set up Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false # Disabled wrapper to keep raw output for state modifications


      # 6. Initialize Terraform
      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      # 7. Terraform Plan (Optional check)
      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan

      # 8. Deploy the infrastructure (and automatically upload the build JAR to S3)
      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve

      # 9. (Optional academic workaround) Commit state file back to repository
      # WARNING: Not for production because state files contain plain-text secrets.
      # For your academic TP, this prevents losing track of created AWS resources.
      - name: Commit and Push Terraform State
        if: always() # Run even if previous steps fail to preserve state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfstate* || true
          if git diff --cached --quiet; then
            echo "No changes in state file."
          else
            git commit -m "Auto-update Terraform state [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

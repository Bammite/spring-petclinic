name: CI/CD Multi-Environment Pipeline - Spring PetClinic

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Indispensable si vous passez à OIDC

jobs:
  # =======================================================
  # 1. BUILD : Compiles the JAR once for all environments
  # =======================================================
  build:
    name: 🏗️ Build Application Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build JAR with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/spring-petclinic-*.jar

  # =======================================================
  # 2. DEV : Automatic deployment to Dev
  # =======================================================
  deploy-dev:
    name: 🚀 Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-jar
          path: target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Isolation du State via Terraform Workspace
      - name: Deploy Dev Infrastructure
        run: |
          cd terraform
          terraform init
          terraform workspace select -or-create dev
          terraform apply -auto-approve -var="environment=dev"

  # =======================================================
  # 3. STAGING : Deployment & Automated Testing in Staging
  # =======================================================
  deploy-staging:
    name: 🧪 Deploy to STAGING
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-jar
          path: target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Isolation du State via Terraform Workspace
      - name: Deploy Staging Infrastructure
        run: |
          cd terraform
          terraform init
          terraform workspace select -or-create staging
          terraform apply -auto-approve -var="environment=staging"

  # =======================================================
  # 4. PROD : Requires Approval -> Deploy to Production
  # =======================================================
  deploy-prod:
    name: 🛡️ Deploy to PRODUCTION
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod # Blocage manuel géré par GitHub Environments
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-jar
          path: target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Isolation du State via Terraform Workspace
      - name: Terraform Init & Apply (Prod)
        run: |
          cd terraform
          terraform init
          terraform workspace select -or-create prod
          terraform apply -auto-approve -var="environment=prod"

      - name: Wait for ASG Instance Refresh (Zero-Downtime)
        run: |
          ASG_NAME=$(cd terraform && terraform output -raw asg_name || echo "")
          if [ -n "$ASG_NAME" ]; then
            aws autoscaling wait instance-refresh-completed --auto-scaling-group-name $ASG_NAME --region us-east-1
          fi

      - name: Run Smoke Test
        id: smoke_test
        run: |
          ALB_URL=$(cd terraform && terraform output -raw alb_url_https)
          echo "Testing application health at $ALB_URL/actuator/health"
          for i in {1..12}; do
            HTTP_STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" "$ALB_URL/actuator/health" || true)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "SUCCESS: Smoke test passed with status 200!"
              exit 0
            fi
            echo "Attempt $i: Received status $HTTP_STATUS. Retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Smoke test failed after 2 minutes!"
          exit 1

      - name: Rollback ASG on Smoke Test Failure
        if: failure() && steps.smoke_test.outcome == 'failure'
        run: |
          ASG_NAME=$(cd terraform && terraform output -raw asg_name || echo "")
          echo "Smoke test failed. Rolling back Instance Refresh..."
          aws autoscaling cancel-instance-refresh --auto-scaling-group-name $ASG_NAME --region us-east-1 || true